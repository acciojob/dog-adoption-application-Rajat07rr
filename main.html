<!DOCTYPE html>
<html>
<head>
    <title>Dog Adoption Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f8;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }

        .checkbox-group {
            margin-top: 10px;
        }

        select[multiple] {
            height: 100px;
        }

        input[type="submit"] {
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Dog Adoption Form</h2>

        <form>

            <!-- Name -->
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Name">

            <!-- Phone -->
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="Phone Number">

            <!-- Address -->
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="Address">

            <!-- Checkbox -->
            <div class="checkbox-group">
                <input type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?">
                <label for="checkbox">Have you ever lived with a Dog before?</label>
            </div>

            <!-- Multi Select -->
            <label for="multiSelect">Please select your preferred breeds</label>
            <select id="multiSelect" multiple>
                <option>Labrador</option>
                <option>German Shepherd</option>
                <option>Pitbull</option>
            </select>

            <!-- Submit -->
            <input type="submit" value="Submit">

        </form>
    </div>

</body>
</html>
