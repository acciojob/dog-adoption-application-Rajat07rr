<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dog Form</title>
</head>
<body>

    <form>

        <!-- Name -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Name"><br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label><br>
        <input type="text" id="phone" name="phone" placeholder="Phone Number"><br><br>

        <!-- Address -->
        <label for="address">Address:</label><br>
        <input type="text" id="address" name="address" placeholder="Address"><br><br>

        <!-- Checkbox -->
        <label>
            <input type="checkbox" id="checkbox" name="checkbox" value="Have you ever lived with a Dog before?">
            "Have you ever lived with a Dog before?"
        </label><br><br>

        <!-- Multi Select -->
        <label for="breeds">Please select your preferred breeds:</label><br>
        <select id="breeds" name="breeds" multiple>
            <option value="Labrador">Labrador</option>
            <option value="German Shepherd">German Shepherd</option>
            <option value="Pitbull">Pitbull</option>
        </select><br><br>

        <!-- Submit -->
        <input type="submit" id="submit" value="Submit">

    </form>

</body>
</html>
